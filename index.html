<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>コインワーク</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DotGothic16&display=swap');

:root {
  --bg:        #f0f9ff;
  --bg2:       #e0f2fe;
  --panel:     #ffffff;
  --border:    #bae6fd;
  --teal:      #0d9488;
  --emerald:   #059669;
  --sky:       #0284c7;
  --violet:    #7c3aed;
  --lime:      #65a30d;
  --coin:      #d97706;
  --work:      #0284c7;
  --priv:      #7c3aed;
  --text:      #1e293b;
  --text-dim:  #64748b;
  --radius:    14px;
  --shadow:    0 2px 12px #0000000d;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 10px 40px;
  gap: 12px;
}

/* ── ヘッダー ── */
header {
  width: 100%;
  max-width: 900px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
}

.logo {
  font-family: 'DotGothic16', monospace;
  font-size: 1rem;
  background: linear-gradient(90deg, var(--teal), var(--sky), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.12em;
}

/* ── コイン概要バー ── */
.coin-overview {
  width: 100%;
  max-width: 900px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
}

.coin-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 110px;
}

.coin-stat-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

.coin-stat-val {
  font-family: 'DotGothic16', monospace;
  font-size: 1.15rem;
  color: var(--coin);
}

.coin-stat-val.spent { color: #dc2626; }
.coin-stat-val.budget { color: var(--emerald); }

.divider-v {
  width: 1px;
  height: 36px;
  background: var(--border);
}

.limit-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  color: var(--text-dim);
}

.limit-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'DotGothic16', monospace;
  font-size: 0.85rem;
  padding: 3px 8px;
  width: 80px;
  outline: none;
  text-align: center;
}
.limit-input:focus { border-color: var(--sky); }

.spend-btn {
  margin-left: auto;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border: 1.5px solid var(--coin);
  border-radius: 99px;
  color: var(--coin);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 6px 16px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.spend-btn:hover { opacity: 0.8; }

/* 予算バー */
.budget-bar-wrap {
  width: 100%;
  height: 6px;
  background: #e2e8f0;
  border-radius: 99px;
  overflow: hidden;
  margin-top: 4px;
}
.budget-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--teal), var(--emerald));
  border-radius: 99px;
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── メインレイアウト（左右） ── */
.main-columns {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

@media (max-width: 600px) {
  .main-columns { grid-template-columns: 1fr; }
}

/* ── タスクパネル ── */
.task-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 300px;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-title {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--sky);
}

.panel-progress {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-family: 'DotGothic16', monospace;
}

/* タスクリスト */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}

.empty-msg {
  font-size: 0.73rem;
  color: var(--text-dim);
  text-align: center;
  padding: 20px 0;
}

.task-item {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 8px 9px;
  transition: all 0.2s;
  animation: slideIn 0.2s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.task-check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2px solid #cbd5e1;
  background: none;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  transition: all 0.2s;
}
.task-check:hover { border-color: var(--emerald); background: #f0fdf4; }

.task-label {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 99px;
  font-weight: 700;
  flex-shrink: 0;
}
.task-label.work { background: #dbeafe; color: var(--work); }
.task-label.priv { background: #ede9fe; color: var(--priv); }

.task-text {
  flex: 1;
  font-size: 0.8rem;
  line-height: 1.4;
}

.task-coin-badge {
  font-size: 0.65rem;
  color: var(--coin);
  font-family: 'DotGothic16', monospace;
  flex-shrink: 0;
}

.task-del {
  background: none;
  border: none;
  color: #cbd5e1;
  cursor: pointer;
  font-size: 0.85rem;
  padding: 0 2px;
  transition: color 0.2s;
  flex-shrink: 0;
}
.task-del:hover { color: #ef4444; }

/* 追加フォーム */
.add-form {
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}

.add-row {
  display: flex;
  gap: 5px;
}

.task-input {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.78rem;
  padding: 7px 9px;
  outline: none;
}
.task-input::placeholder { color: var(--text-dim); }
.task-input:focus { border-color: var(--sky); }

.add-options {
  display: flex;
  gap: 5px;
  align-items: center;
}

.label-select, .coin-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.75rem;
  padding: 5px 6px;
  outline: none;
  cursor: pointer;
}

.add-btn {
  background: linear-gradient(135deg, var(--teal), var(--sky));
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  padding: 5px 13px;
  cursor: pointer;
  transition: opacity 0.2s;
  flex-shrink: 0;
}
.add-btn:hover { opacity: 0.85; }

.reset-btn {
  background: none;
  border: 1px dashed #cbd5e1;
  border-radius: 7px;
  color: var(--text-dim);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.68rem;
  padding: 5px;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
}
.reset-btn:hover { border-color: var(--sky); color: var(--sky); }

/* ── 獲得履歴 ── */
.history-panel {
  width: 100%;
  max-width: 900px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px;
}

.history-title {
  font-size: 0.72rem;
  color: var(--violet);
  font-weight: 700;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

.history-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 200px;
  overflow-y: auto;
}

.history-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  animation: slideIn 0.2s ease;
}

.history-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--emerald);
  border: none;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  color: #fff;
  transition: all 0.2s;
}
.history-check:hover { background: #ef4444; }
.history-check:hover::after { content: '↩'; }
.history-check:not(:hover)::after { content: '✓'; }

.h-label {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 99px;
  font-weight: 700;
  flex-shrink: 0;
}
.h-label.work { background: #dbeafe; color: var(--work); }
.h-label.priv { background: #ede9fe; color: var(--priv); }

.h-text { flex: 1; font-size: 0.78rem; color: var(--text); }
.h-coin { font-family: 'DotGothic16', monospace; font-size: 0.72rem; color: var(--coin); flex-shrink: 0; }
.h-ts   { font-size: 0.65rem; color: var(--text-dim); flex-shrink: 0; }

/* ── コイン飛翔 ── */
.flying-coin {
  position: fixed;
  font-size: 1.4rem;
  pointer-events: none;
  z-index: 999;
  animation: flyUp 0.75s ease forwards;
}
@keyframes flyUp {
  0%   { opacity: 1; transform: scale(1) translateY(0); }
  60%  { opacity: 1; transform: scale(1.4) translateY(-40px); }
  100% { opacity: 0; transform: scale(0.3) translateY(-100px); }
}

/* ── コイン消費モーダル ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #00000044;
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--panel);
  border-radius: var(--radius);
  padding: 22px;
  width: 300px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px #00000022;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.modal h2 { font-size: 0.9rem; color: var(--coin); }
.modal p  { font-size: 0.75rem; color: var(--text-dim); }

.modal-input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DotGothic16', monospace;
  font-size: 1rem;
  padding: 8px 12px;
  width: 100%;
  outline: none;
  text-align: center;
}
.modal-input:focus { border-color: var(--coin); }

.modal-memo {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.8rem;
  padding: 7px 10px;
  width: 100%;
  outline: none;
}

.modal-btns { display: flex; gap: 8px; }

.modal-ok {
  flex: 1;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  border: 1.5px solid var(--coin);
  border-radius: 8px;
  color: var(--coin);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  padding: 8px;
  cursor: pointer;
}
.modal-cancel {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-dim);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.85rem;
  padding: 8px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo">🪙 コインワーク</div>
</header>

<!-- コイン概要 -->
<div class="coin-overview">
  <div class="coin-stat">
    <span class="coin-stat-label">💰 累計コイン</span>
    <span class="coin-stat-val" id="totalCoins">0枚</span>
  </div>
  <div class="divider-v"></div>
  <div class="coin-stat">
    <span class="coin-stat-label">🛍️ 今月の使用上限</span>
    <div class="limit-row">
      <input class="limit-input" type="number" id="limitInput" value="30000" min="0">
      <span>円</span>
    </div>
  </div>
  <div class="divider-v"></div>
  <div class="coin-stat">
    <span class="coin-stat-label">📤 今月の使用済み</span>
    <span class="coin-stat-val spent" id="spentVal">¥0</span>
  </div>
  <div class="divider-v"></div>
  <div class="coin-stat">
    <span class="coin-stat-label">✨ 残り使用可能</span>
    <span class="coin-stat-val budget" id="remainVal">¥0</span>
  </div>
  <button class="spend-btn" id="spendBtn">🪙 コインを使う</button>
  <div style="width:100%">
    <div class="budget-bar-wrap">
      <div class="budget-bar" id="budgetBar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- 左右カラム -->
<div class="main-columns">

  <!-- 週タスク -->
  <div class="task-panel">
    <div class="panel-header">
      <span class="panel-title">📋 週タスク</span>
      <span class="panel-progress" id="weekProgress">0/0</span>
    </div>
    <div class="task-list" id="weekList"></div>
    <div class="add-form">
      <div class="add-row">
        <input class="task-input" id="weekInput" placeholder="タスクを追加…" type="text">
        <button class="add-btn" id="weekAdd">＋</button>
      </div>
      <div class="add-options">
        <select class="label-select" id="weekLabel">
          <option value="work">💼 仕事</option>
          <option value="priv">🌿 プライベート</option>
        </select>
        <select class="coin-select" id="weekCoin">
          <option value="1">🪙1</option>
          <option value="2">🪙2</option>
          <option value="3" selected>🪙3</option>
          <option value="5">🪙5</option>
          <option value="10">🪙10</option>
        </select>
      </div>
      <button class="reset-btn" id="weekReset">週をリセット</button>
    </div>
  </div>

  <!-- 今日の予定 -->
  <div class="task-panel">
    <div class="panel-header">
      <span class="panel-title">⚡ 今日の予定</span>
      <span class="panel-progress" id="dayProgress">0/0</span>
    </div>
    <div class="task-list" id="dayList"></div>
    <div class="add-form">
      <div class="add-row">
        <input class="task-input" id="dayInput" placeholder="今日やること…" type="text">
        <button class="add-btn" id="dayAdd">＋</button>
      </div>
      <div class="add-options">
        <select class="label-select" id="dayLabel">
          <option value="work">💼 仕事</option>
          <option value="priv">🌿 プライベート</option>
        </select>
        <select class="coin-select" id="dayCoin">
          <option value="1" selected>🪙1</option>
          <option value="2">🪙2</option>
          <option value="3">🪙3</option>
          <option value="5">🪙5</option>
        </select>
      </div>
      <button class="reset-btn" id="dayReset">今日の予定をリセット</button>
    </div>
  </div>

</div>

<!-- 獲得履歴 -->
<div class="history-panel">
  <div class="history-title">📜 獲得履歴（チェックを外すと取り消し）</div>
  <div class="history-list" id="historyList">
    <div class="empty-msg">まだ記録がありません</div>
  </div>
</div>

<!-- コイン消費モーダル -->
<div class="modal-overlay" id="spendModal">
  <div class="modal">
    <h2>🪙 コインを使う</h2>
    <p>何に使いましたか？金額を入力してください。</p>
    <input class="modal-input" type="number" id="spendAmount" placeholder="金額（円）" min="1">
    <input class="modal-memo" type="text" id="spendMemo" placeholder="メモ（例：本、おやつ）">
    <div class="modal-btns">
      <button class="modal-ok" id="spendOk">使う</button>
      <button class="modal-cancel" id="spendCancel">キャンセル</button>
    </div>
  </div>
</div>

<script>
// ── ストレージ ──────────────────────────────────────────────
function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {} 
}

// ── 状態 ────────────────────────────────────────────────────
let totalCoins = load('cw_totalCoins', 0);
let spentYen   = load('cw_spentYen', 0);
let limitYen   = load('cw_limitYen', 30000);
let ratePerCoin= load('cw_rate', 150);
let weekTasks  = load('cw_weekTasks', []);
let dayTasks   = load('cw_dayTasks', []);
let history    = load('cw_history', []);

// ── 音 ──────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCoin(n = 1) {
  audioCtx.resume();
  for (let i = 0; i < Math.min(n, 6); i++) {
    setTimeout(() => {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(1320, t + 0.08);
      osc.frequency.exponentialRampToValueAtTime(1100, t + 0.18);
      gain.gain.setValueAtTime(0.28, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
      osc.start(t); osc.stop(t + 0.32);
    }, i * 90);
  }
}

function playUndo() {
  audioCtx.resume();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.exponentialRampToValueAtTime(300, t + 0.2);
  gain.gain.setValueAtTime(0.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  osc.start(t); osc.stop(t + 0.25);
}

// ── コイン飛翔 ──────────────────────────────────────────────
function spawnCoins(el, n) {
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < Math.min(n, 5); i++) {
    setTimeout(() => {
      const coin = document.createElement('div');
      coin.className = 'flying-coin';
      coin.textContent = '🪙';
      coin.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*30) + 'px';
      coin.style.top  = rect.top + 'px';
      document.body.appendChild(coin);
      setTimeout(() => coin.remove(), 800);
    }, i * 80);
  }
}

// ── UI更新 ──────────────────────────────────────────────────
function updateOverview() {
  const totalYen = totalCoins * ratePerCoin;
  const remain = Math.max(0, limitYen - spentYen);
  const pct = limitYen > 0 ? Math.min(spentYen / limitYen * 100, 100) : 0;

  document.getElementById('totalCoins').textContent = totalCoins + '枚';
  document.getElementById('spentVal').textContent = '¥' + spentYen.toLocaleString();
  document.getElementById('remainVal').textContent = '¥' + remain.toLocaleString();
  document.getElementById('budgetBar').style.width = pct + '%';
}

function renderTasks(tasks, listId, progressId) {
  const list = document.getElementById(listId);
  const prog = document.getElementById(progressId);
  const active = tasks.filter(t => !t.done);
  const done   = tasks.filter(t => t.done).length;
  const total  = tasks.length;

  prog.textContent = `${done}/${total}`;
  list.innerHTML = '';

  if (active.length === 0) {
    list.innerHTML = '<div class="empty-msg">タスクなし</div>';
    return;
  }

  active.forEach((task) => {
    const idx = tasks.indexOf(task);
    const item = document.createElement('div');
    item.className = 'task-item';

    const check = document.createElement('button');
    check.className = 'task-check';
    check.title = 'チェックで完了→履歴へ移動';
    check.addEventListener('click', () => completeTask(tasks, idx, listId, progressId, check));

    const lbl = document.createElement('span');
    lbl.className = 'task-label ' + (task.label || 'work');
    lbl.textContent = task.label === 'priv' ? 'プライベート' : '仕事';

    const text = document.createElement('span');
    text.className = 'task-text';
    text.textContent = task.text;

    const coinBadge = document.createElement('span');
    coinBadge.className = 'task-coin-badge';
    coinBadge.textContent = '🪙' + task.coin;

    const del = document.createElement('button');
    del.className = 'task-del';
    del.textContent = '✕';
    del.addEventListener('click', () => {
      tasks.splice(idx, 1);
      saveTaskList(tasks, listId);
      renderTasks(tasks, listId, progressId);
    });

    item.appendChild(check);
    item.appendChild(lbl);
    item.appendChild(text);
    item.appendChild(coinBadge);
    item.appendChild(del);
    list.appendChild(item);
  });
}

function completeTask(tasks, idx, listId, progressId, checkEl) {
  const task = tasks[idx];
  task.done = true;
  saveTaskList(tasks, listId);

  // コイン加算
  totalCoins += task.coin;
  save('cw_totalCoins', totalCoins);
  updateOverview();

  // 音＆アニメ
  playCoin(task.coin);
  spawnCoins(checkEl, task.coin);

  // 履歴追加
  const now = new Date();
  const ts = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const historyEntry = {
    id: Date.now(),
    text: task.text,
    coin: task.coin,
    label: task.label || 'work',
    ts,
    sourceList: listId,
    sourceIdx: idx,
    originalTask: { ...task }
  };
  history.unshift(historyEntry);
  save('cw_history', history);

  renderTasks(tasks, listId, progressId);
  renderHistory();
}

function undoHistory(histId) {
  const idx = history.findIndex(h => h.id === histId);
  if (idx < 0) return;
  const entry = history[idx];

  // コイン減算
  totalCoins = Math.max(0, totalCoins - entry.coin);
  save('cw_totalCoins', totalCoins);
  updateOverview();

  // タスクを戻す
  const tasks = entry.sourceList === 'weekList' ? weekTasks : dayTasks;
  const restored = { ...entry.originalTask, done: false };
  tasks.push(restored);
  saveTaskList(tasks, entry.sourceList);

  const progressId = entry.sourceList === 'weekList' ? 'weekProgress' : 'dayProgress';
  renderTasks(tasks, entry.sourceList, progressId);

  // 履歴から削除
  history.splice(idx, 1);
  save('cw_history', history);

  playUndo();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div class="empty-msg">まだ記録がありません</div>';
    return;
  }
  list.innerHTML = '';
  history.slice(0, 30).forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';

    const check = document.createElement('button');
    check.className = 'history-check';
    check.title = 'クリックで取り消し';
    check.addEventListener('click', () => undoHistory(h.id));

    const lbl = document.createElement('span');
    lbl.className = 'h-label ' + (h.label || 'work');
    lbl.textContent = h.label === 'priv' ? 'プライベート' : '仕事';

    const text = document.createElement('span');
    text.className = 'h-text';
    text.textContent = h.text;

    const coin = document.createElement('span');
    coin.className = 'h-coin';
    coin.textContent = '+🪙' + h.coin;

    const ts = document.createElement('span');
    ts.className = 'h-ts';
    ts.textContent = h.ts;

    item.appendChild(check);
    item.appendChild(lbl);
    item.appendChild(text);
    item.appendChild(coin);
    item.appendChild(ts);
    list.appendChild(item);
  });
}

function saveTaskList(tasks, listId) {
  if (listId === 'weekList') save('cw_weekTasks', tasks);
  else save('cw_dayTasks', tasks);
}

function addTask(tasks, inputId, labelId, coinId, listId, progressId) {
  const input = document.getElementById(inputId);
  const label = document.getElementById(labelId).value;
  const coin  = parseInt(document.getElementById(coinId).value);
  const text  = input.value.trim();
  if (!text) return;
  tasks.push({ text, coin, label, done: false });
  saveTaskList(tasks, listId);
  renderTasks(tasks, listId, progressId);
  input.value = '';
  input.focus();
}

// ── イベント ────────────────────────────────────────────────
document.getElementById('weekAdd').addEventListener('click', () =>
  addTask(weekTasks, 'weekInput', 'weekLabel', 'weekCoin', 'weekList', 'weekProgress'));
document.getElementById('weekInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask(weekTasks, 'weekInput', 'weekLabel', 'weekCoin', 'weekList', 'weekProgress');
});

document.getElementById('dayAdd').addEventListener('click', () =>
  addTask(dayTasks, 'dayInput', 'dayLabel', 'dayCoin', 'dayList', 'dayProgress'));
document.getElementById('dayInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask(dayTasks, 'dayInput', 'dayLabel', 'dayCoin', 'dayList', 'dayProgress');
});

document.getElementById('weekReset').addEventListener('click', () => {
  if (!confirm('週タスクをリセットしますか？')) return;
  weekTasks.length = 0;
  save('cw_weekTasks', weekTasks);
  renderTasks(weekTasks, 'weekList', 'weekProgress');
});

document.getElementById('dayReset').addEventListener('click', () => {
  if (!confirm('今日の予定をリセットしますか？')) return;
  dayTasks.length = 0;
  save('cw_dayTasks', dayTasks);
  renderTasks(dayTasks, 'dayList', 'dayProgress');
});

document.getElementById('limitInput').addEventListener('change', e => {
  limitYen = Math.max(0, parseInt(e.target.value) || 0);
  save('cw_limitYen', limitYen);
  updateOverview();
});

// コイン消費モーダル
document.getElementById('spendBtn').addEventListener('click', () => {
  document.getElementById('spendAmount').value = '';
  document.getElementById('spendMemo').value = '';
  document.getElementById('spendModal').classList.add('open');
});
document.getElementById('spendCancel').addEventListener('click', () => {
  document.getElementById('spendModal').classList.remove('open');
});
document.getElementById('spendOk').addEventListener('click', () => {
  const amount = parseInt(document.getElementById('spendAmount').value);
  if (!amount || amount <= 0) { alert('金額を入力してください'); return; }
  const remain = limitYen - spentYen;
  if (amount > remain) {
    if (!confirm(`今月の残り使用可能額（¥${remain.toLocaleString()}）を超えています。続けますか？`)) return;
  }
  spentYen += amount;
  save('cw_spentYen', spentYen);
  updateOverview();
  document.getElementById('spendModal').classList.remove('open');
});
document.getElementById('spendModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── 初期化 ──────────────────────────────────────────────────
document.getElementById('limitInput').value = limitYen;
updateOverview();
renderTasks(weekTasks, 'weekList', 'weekProgress');
renderTasks(dayTasks, 'dayList', 'dayProgress');
renderHistory();
</script>
</body>
