<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>コインワーク</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=DotGothic16&display=swap');

:root {
  /* スクショ準拠パレット */
  --sky:       #b7e6ee;   /* 空 */
  --sky2:      #cdeef4;
  --cloud:     #fbeef0;   /* 雲ピンク */
  --sakura:    #f6b8cc;   /* 桜 */
  --sakura2:   #fad3df;
  --wood:      #6b4a33;   /* 濃い木 */
  --wood2:     #9c7350;   /* 明るい木 */
  --wood3:     #c9a276;   /* 床 */
  --cream:     #fff6e8;   /* パネル地 */
  --cream2:    #fdeeda;
  --wallpink:  #f9dde3;   /* 室内壁 */
  --leaf:      #7cae5a;   /* 葉っぱ緑 */
  --coin:      #d99a2b;   /* コイン金 */
  --coinlight: #ffe9b3;
  --red:       #d9636b;
  --text:      #4a3628;   /* 文字＝焦げ茶 */
  --dim:       #a08872;
  --pxborder:  3px solid var(--wood);
  --pxshadow:  0 4px 0 #00000018;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { overflow-x: hidden; }

body {
  overflow-x: hidden; /* 背後の桜のはみ出しで横スクロールさせない */
  background:
    /* 雲（下層・ハードエッジ） */
    radial-gradient(circle at 12% 108%, var(--cloud) 0 18%, transparent 18.5%),
    radial-gradient(circle at 30% 115%, #fdf3f4 0 22%, transparent 22.5%),
    radial-gradient(circle at 55% 112%, var(--cloud) 0 20%, transparent 20.5%),
    radial-gradient(circle at 78% 116%, #fdf3f4 0 24%, transparent 24.5%),
    radial-gradient(circle at 96% 108%, var(--cloud) 0 17%, transparent 17.5%),
    /* 浮き雲 */
    radial-gradient(circle at 85% 18%, #ffffffaa 0 5%, transparent 5.5%),
    radial-gradient(circle at 90% 21%, #ffffff88 0 4%, transparent 4.5%),
    radial-gradient(circle at 10% 30%, #ffffff99 0 4.5%, transparent 5%),
    radial-gradient(circle at 15% 33%, #ffffff77 0 3.5%, transparent 4%),
    /* 空 */
    linear-gradient(180deg, var(--sky) 0%, var(--sky2) 55%, #f2e4e6 100%);
  background-attachment: fixed;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 10px 40px;
  gap: 12px;
}

/* ── ヘッダー ── */
header {
  width: 100%;
  max-width: 960px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 2px;
}

.logo {
  font-family: 'DotGothic16', monospace;
  font-size: 1.15rem;
  color: var(--wood);
  letter-spacing: 0.14em;
  text-shadow: 2px 2px 0 #ffffffcc;
}

.sync-status {
  font-family: 'DotGothic16', monospace;
  font-size: 0.68rem;
  color: var(--dim);
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: default;
  background: #ffffffb8;
  border: 2px solid var(--wood2);
  padding: 3px 9px;
}
.sync-status.ok    #syncStatusText { color: var(--leaf); }
.sync-status.err   #syncStatusText { color: var(--red); }
.sync-status.busy  #syncStatusText { color: #5a9bb0; }

/* ── 共通パネル：木枠の小屋風 ── */
.coin-overview, .task-panel, .history-panel, .wishlist-panel, .modal {
  background: var(--cream);
  border: var(--pxborder);
  border-radius: 0;
  box-shadow:
    inset 0 0 0 2px #ffffff,
    inset 0 0 0 4px var(--cream2),
    var(--pxshadow);
  image-rendering: pixelated;
}

/* ── コイン概要 ── */
.coin-overview {
  width: 100%;
  max-width: 960px;
  padding: 16px 18px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: flex-start;
  position: relative;
  margin-top: 34px; /* 背後の桜がはみ出すぶんの余白 */
}
/* もこもこ桜（パネル背後・左） */
.coin-overview::before {
  content: '';
  position: absolute;
  top: -52px; left: -46px;
  width: 340px; height: 230px;
  z-index: -1;
  background:
    radial-gradient(circle at 24% 30%, var(--sakura2) 0 40px, transparent 41px),
    radial-gradient(circle at 46% 20%, var(--sakura)  0 48px, transparent 49px),
    radial-gradient(circle at 70% 32%, var(--sakura2) 0 38px, transparent 39px),
    radial-gradient(circle at 12% 52%, var(--sakura)  0 44px, transparent 45px),
    radial-gradient(circle at 38% 48%, #ec9fbb 0 46px, transparent 47px),
    radial-gradient(circle at 64% 55%, var(--sakura)  0 42px, transparent 43px),
    radial-gradient(circle at 86% 50%, #ec9fbb 0 34px, transparent 35px);
}
/* もこもこ桜（パネル背後・右） */
.coin-overview::after {
  content: '';
  position: absolute;
  top: -44px; right: -40px;
  width: 260px; height: 190px;
  z-index: -1;
  background:
    radial-gradient(circle at 34% 24%, var(--sakura)  0 42px, transparent 43px),
    radial-gradient(circle at 62% 32%, var(--sakura2) 0 36px, transparent 37px),
    radial-gradient(circle at 18% 50%, #ec9fbb 0 34px, transparent 35px),
    radial-gradient(circle at 48% 56%, var(--sakura)  0 40px, transparent 41px),
    radial-gradient(circle at 78% 58%, #ec9fbb 0 32px, transparent 33px);
}

.coin-stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 90px;
  padding-top: 4px;
}

.stat-label {
  font-size: 0.62rem;
  color: var(--dim);
  letter-spacing: 0.07em;
  font-weight: 700;
}

.stat-main {
  font-family: 'DotGothic16', monospace;
  font-size: 1.1rem;
  color: var(--coin);
  text-shadow: 1px 1px 0 #ffffff;
}
.stat-sub {
  font-size: 0.75rem;
  color: var(--dim);
  font-family: 'DotGothic16', monospace;
}
.stat-main.red, .stat-sub.red { color: var(--red); }
.stat-main.green { color: var(--leaf); }

.dv {
  width: 3px; height: 42px;
  background: repeating-linear-gradient(180deg,
    var(--sakura2) 0 4px, transparent 4px 8px);
  align-self: center;
}

.setting-group {
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding-top: 4px;
}
.setting-inner {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.73rem;
  color: var(--dim);
}
.setting-input {
  background: #ffffff;
  border: 2px solid var(--wood2);
  border-radius: 0;
  color: var(--text);
  font-family: 'DotGothic16', monospace;
  font-size: 0.85rem;
  padding: 3px 7px;
  width: 80px;
  outline: none;
  text-align: center;
}
.setting-input:focus { border-color: var(--sakura); background: #fff8fa; }

.spend-btn {
  margin-left: auto;
  align-self: center;
  background: var(--coinlight);
  border: 2px solid var(--coin);
  border-radius: 0;
  color: #9c6a12;
  font-family: 'DotGothic16', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 8px 18px;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 3px 0 var(--coin);
  transition: transform 0.05s, box-shadow 0.05s;
}
.spend-btn:hover { filter: brightness(1.04); }
.spend-btn:active { transform: translateY(3px); box-shadow: 0 0 0 var(--coin); }

.budget-bar-wrap {
  width: 100%;
  height: 10px;
  background: #ffffff;
  border: 2px solid var(--wood2);
  overflow: hidden;
}
.budget-bar {
  height: 100%;
  background: repeating-linear-gradient(90deg,
    var(--sakura) 0 8px, #f9a4bf 8px 16px);
  transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── メインタブ：木の看板風 ── */
.main-tabs {
  width: 100%;
  max-width: 960px;
  display: flex;
  gap: 8px;
}

.main-tab {
  flex: 1;
  background: var(--wood3);
  border: var(--pxborder);
  border-radius: 0;
  color: #fff8ec;
  font-family: 'DotGothic16', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  padding: 11px 10px;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 4px 0 var(--wood), inset 0 2px 0 #ffffff55;
  text-shadow: 1px 1px 0 #00000033;
  transition: transform 0.05s, box-shadow 0.05s, background 0.15s;
}
.main-tab:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--wood), inset 0 2px 0 #ffffff55; }
.main-tab.active {
  background: var(--sakura);
  color: #7a3b52;
  text-shadow: 1px 1px 0 #ffffff88;
  box-shadow: 0 4px 0 #c4788f, inset 0 2px 0 #ffffff77;
  border-color: #a05c73;
}

/* ── タブコンテンツ ── */
.tab-content { display: none; width: 100%; max-width: 960px; }
.tab-content.visible { display: block; }

/* ── タスク画面 ── */
.task-columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
@media (max-width: 600px) {
  .task-columns { grid-template-columns: 1fr; }
}

.task-panel {
  padding: 16px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 280px;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px dashed var(--sakura2);
  padding-bottom: 7px;
}

.panel-title {
  font-family: 'DotGothic16', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--wood);
}

.panel-progress {
  font-size: 0.72rem;
  color: #b76e88;
  font-family: 'DotGothic16', monospace;
  background: var(--sakura2);
  border: 2px solid var(--sakura);
  padding: 1px 7px;
}

.task-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex: 1;
}

.empty-msg {
  font-family: 'DotGothic16', monospace;
  font-size: 0.73rem;
  color: var(--dim);
  text-align: center;
  padding: 20px 0;
}

.task-item {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #ffffff;
  border: 2px solid var(--wood3);
  padding: 8px 9px;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { opacity:0; transform:translateY(-5px); }
  to   { opacity:1; transform:translateY(0); }
}

.task-check {
  width: 20px; height: 20px;
  border-radius: 0;
  border: 2px solid var(--wood2);
  background: var(--cream);
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  transition: all 0.15s;
}
.task-check:hover { border-color: var(--leaf); background: #eef7e4; }

.task-label {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 0;
  font-weight: 700;
  flex-shrink: 0;
  font-family: 'DotGothic16', monospace;
}
.task-label.work { background: #d8ecf2; color: #4a7f92; border: 1px solid #a8cdd9; }
.task-label.priv { background: var(--sakura2); color: #b05c78; border: 1px solid var(--sakura); }

.task-text { flex: 1; font-size: 0.8rem; line-height: 1.4; }

.task-coin-badge {
  font-size: 0.68rem;
  color: var(--coin);
  font-family: 'DotGothic16', monospace;
  flex-shrink: 0;
}

.task-del {
  background: none; border: none;
  color: #d9c3ad; cursor: pointer;
  font-size: 0.85rem; padding: 0 2px;
  transition: color 0.2s; flex-shrink: 0;
}
.task-del:hover { color: var(--red); }

.add-form {
  display: flex; flex-direction: column; gap: 6px;
  border-top: 2px dashed var(--sakura2);
  padding-top: 10px;
}
.add-row { display: flex; gap: 5px; }

.task-input {
  flex: 1;
  background: #ffffff;
  border: 2px solid var(--wood2);
  border-radius: 0;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.78rem;
  padding: 7px 9px;
  outline: none;
}
.task-input::placeholder { color: var(--dim); }
.task-input:focus { border-color: var(--sakura); background: #fff8fa; }

.add-options { display: flex; gap: 5px; align-items: center; }

.label-select, .coin-select {
  background: #ffffff;
  border: 2px solid var(--wood2);
  border-radius: 0;
  color: var(--text);
  font-family: 'DotGothic16', monospace;
  font-size: 0.75rem;
  padding: 5px 6px;
  outline: none; cursor: pointer;
}

.add-btn {
  background: var(--leaf);
  border: 2px solid #5c8a3f; border-radius: 0;
  color: #fff; font-weight: 700;
  font-family: 'DotGothic16', monospace;
  font-size: 1rem; padding: 5px 13px;
  cursor: pointer; flex-shrink: 0;
  box-shadow: 0 3px 0 #5c8a3f;
  transition: transform 0.05s, box-shadow 0.05s;
}
.add-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #5c8a3f; }

.reset-btn {
  background: none;
  border: 2px dashed var(--wood3);
  border-radius: 0;
  color: var(--dim);
  font-family: 'DotGothic16', monospace;
  font-size: 0.68rem;
  padding: 6px; cursor: pointer;
  transition: all 0.2s; width: 100%;
}
.reset-btn:hover { border-color: var(--sakura); color: #b05c78; background: #fff5f8; }

/* 履歴 */
.history-panel {
  padding: 16px 14px 14px;
  margin-top: 12px;
}

.history-title {
  font-family: 'DotGothic16', monospace;
  font-size: 0.78rem;
  color: var(--wood);
  font-weight: 700;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  border-bottom: 2px dashed var(--sakura2);
  padding-bottom: 7px;
}

.history-list {
  display: flex; flex-direction: column; gap: 4px;
  max-height: 180px; overflow-y: auto;
}

.history-item {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 8px;
  background: #ffffff;
  border: 2px solid var(--wood3);
  animation: slideIn 0.2s ease;
}

.history-check {
  width: 18px; height: 18px;
  border-radius: 0;
  background: var(--leaf);
  border: 2px solid #5c8a3f; cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem; color: #fff;
  transition: background 0.2s, border-color 0.2s;
  position: relative;
}
.history-check:hover { background: var(--red); border-color: #a84850; }
.history-check::after { content: '✓'; }
.history-check:hover::after { content: '↩'; }

.h-label {
  font-size: 0.6rem; padding: 1px 6px;
  border-radius: 0; font-weight: 700; flex-shrink: 0;
  font-family: 'DotGothic16', monospace;
}
.h-label.work { background: #d8ecf2; color: #4a7f92; border: 1px solid #a8cdd9; }
.h-label.priv { background: var(--sakura2); color: #b05c78; border: 1px solid var(--sakura); }
.h-text { flex: 1; font-size: 0.78rem; }
.h-coin { font-family: 'DotGothic16', monospace; font-size: 0.72rem; color: var(--coin); flex-shrink: 0; }
.h-ts   { font-size: 0.65rem; color: var(--dim); flex-shrink: 0; font-family: 'DotGothic16', monospace; }

/* ── 欲しいものリスト ── */
.wishlist-panel {
  padding: 18px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.wish-add-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
@media (max-width: 500px) {
  .wish-add-form { grid-template-columns: 1fr; }
}

.wish-input {
  background: #ffffff;
  border: 2px solid var(--wood2);
  border-radius: 0;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.8rem;
  padding: 8px 10px;
  outline: none;
  width: 100%;
}
.wish-input::placeholder { color: var(--dim); }
.wish-input:focus { border-color: var(--sakura); background: #fff8fa; }

.wish-add-btn {
  grid-column: 1 / -1;
  background: var(--sakura);
  border: 2px solid #c4788f; border-radius: 0;
  color: #7a3b52; font-weight: 700;
  font-family: 'DotGothic16', monospace;
  font-size: 0.85rem; padding: 10px;
  cursor: pointer;
  box-shadow: 0 3px 0 #c4788f;
  text-shadow: 1px 1px 0 #ffffff66;
  transition: transform 0.05s, box-shadow 0.05s;
}
.wish-add-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #c4788f; }

.wish-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.wish-item {
  background: #ffffff;
  border: 2px solid var(--wood3);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideIn 0.2s ease;
  transition: border-color 0.2s;
}
.wish-item.affordable {
  border-color: var(--leaf);
  background: #f4faee;
  box-shadow: inset 0 0 0 1px #cfe5bd;
}
.wish-item.bought {
  opacity: 0.5;
  border-style: dashed;
}

.wish-info { flex: 1; display: flex; flex-direction: column; gap: 3px; }

.wish-name {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text);
}
.wish-item.bought .wish-name { text-decoration: line-through; color: var(--dim); }

.wish-price-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.wish-price {
  font-family: 'DotGothic16', monospace;
  font-size: 0.8rem;
  color: var(--coin);
}

.wish-coins-needed {
  font-size: 0.72rem;
  color: var(--dim);
  font-family: 'DotGothic16', monospace;
}
.wish-coins-needed.ok { color: var(--leaf); font-weight: 700; }
.wish-coins-needed.ng { color: var(--red); }

.wish-url {
  font-size: 0.68rem;
  color: #5a9bb0;
  text-decoration: none;
  word-break: break-all;
}
.wish-url:hover { text-decoration: underline; }

.wish-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }

.wish-buy-btn {
  background: var(--coinlight);
  border: 2px solid var(--coin);
  border-radius: 0;
  color: #9c6a12;
  font-family: 'DotGothic16', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 5px 10px;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: 0 2px 0 var(--coin);
  transition: transform 0.05s, box-shadow 0.05s;
}
.wish-buy-btn:active { transform: translateY(2px); box-shadow: 0 0 0 var(--coin); }
.wish-buy-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.wish-del-btn {
  background: none;
  border: 2px solid var(--cream2);
  border-radius: 0;
  color: var(--dim);
  font-family: 'DotGothic16', monospace;
  font-size: 0.72rem;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.wish-del-btn:hover { border-color: var(--red); color: var(--red); }

/* ── 飛翔コイン ── */
.flying-coin {
  position: fixed; font-size: 1.4rem;
  pointer-events: none; z-index: 999;
  animation: flyUp 0.75s ease forwards;
}
@keyframes flyUp {
  0%   { opacity:1; transform:scale(1) translateY(0); }
  60%  { opacity:1; transform:scale(1.4) translateY(-40px); }
  100% { opacity:0; transform:scale(0.3) translateY(-100px); }
}

/* ── 桜の花びら ── */
.petal {
  position: fixed;
  top: -20px;
  font-size: 0.85rem;
  pointer-events: none;
  z-index: 1;
  animation: petalFall linear forwards;
  opacity: 0.8;
}
@keyframes petalFall {
  0%   { transform: translateY(0) translateX(0) rotate(0deg); }
  100% { transform: translateY(110vh) translateX(60px) rotate(300deg); opacity: 0.4; }
}

/* ── モーダル ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: #4a362866; z-index: 200;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }

.modal {
  padding: 24px 22px 22px; width: 300px;
  display: flex; flex-direction: column; gap: 10px;
  position: relative;
}
.modal::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 7px;
  background: repeating-linear-gradient(90deg,
    var(--wood2) 0 12px, var(--wood) 12px 24px);
}
.modal h2 { font-family: 'DotGothic16', monospace; font-size: 0.95rem; color: var(--wood); padding-top: 4px; }
.modal p  { font-size: 0.75rem; color: var(--dim); }

.modal-input, .modal-memo {
  background: #ffffff;
  border: 2px solid var(--wood2);
  border-radius: 0;
  color: var(--text);
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 0.85rem;
  padding: 8px 12px;
  width: 100%; outline: none;
}
.modal-input { font-family: 'DotGothic16', monospace; text-align: center; }
.modal-input:focus, .modal-memo:focus { border-color: var(--coin); background: #fffdf5; }

.coin-preview {
  font-size: 0.78rem;
  color: var(--dim);
  text-align: center;
  min-height: 1.2em;
}
.coin-preview span { color: var(--coin); font-family: 'DotGothic16', monospace; font-weight: 700; }

.modal-btns { display: flex; gap: 8px; }
.modal-ok {
  flex: 1;
  background: var(--coinlight);
  border: 2px solid var(--coin); border-radius: 0;
  color: #9c6a12; font-family: 'DotGothic16', monospace;
  font-weight: 700; font-size: 0.85rem; padding: 8px; cursor: pointer;
  box-shadow: 0 3px 0 var(--coin);
  transition: transform 0.05s, box-shadow 0.05s;
}
.modal-ok:active { transform: translateY(3px); box-shadow: 0 0 0 var(--coin); }
.modal-cancel {
  flex: 1;
  background: var(--cream2); border: 2px solid var(--wood3);
  border-radius: 0; color: var(--dim);
  font-family: 'DotGothic16', monospace;
  font-size: 0.85rem; padding: 8px; cursor: pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo">🪙 コインワーク</div>
  <div class="sync-status" id="syncStatus" title="クラウド同期の状態">☁️ <span id="syncStatusText">未設定</span></div>
</header>

<!-- コイン概要 -->
<div class="coin-overview">
  <div class="setting-group">
    <span class="stat-label">⚙️ 1枚あたり</span>
    <div class="setting-inner">
      <input class="setting-input" type="number" id="rateInput" value="150" min="1">
      <span>円</span>
    </div>
  </div>

  <div class="dv"></div>

  <div class="coin-stat">
    <span class="stat-label">💰 累計コイン（稼いだ総数）</span>
    <span class="stat-main" id="totalCoinsDisp">0枚</span>
    <span class="stat-sub" id="totalYenDisp">¥0</span>
  </div>

  <div class="dv"></div>

  <div class="setting-group">
    <span class="stat-label">🛍️ 今月の使用上限</span>
    <div class="setting-inner">
      <input class="setting-input" type="number" id="limitInput" value="30000" min="0">
      <span>円</span>
    </div>
  </div>

  <div class="dv"></div>

  <div class="coin-stat">
    <span class="stat-label">📤 今月の使用済み</span>
    <span class="stat-main" id="spentCoinsDisp" style="color:var(--red)">0枚</span>
    <span class="stat-sub" id="spentYenDisp">¥0</span>
  </div>

  <div class="dv"></div>

  <div class="coin-stat">
    <span class="stat-label">✨ 残り使用可能</span>
    <span class="stat-main green" id="remainCoinsDisp">0枚</span>
    <span class="stat-sub" id="remainYenDisp">¥0</span>
  </div>

  <button class="spend-btn" id="spendBtn">🪙 コインを使う</button>

  <div style="width:100%">
    <div class="budget-bar-wrap">
      <div class="budget-bar" id="budgetBar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- メインタブ -->
<div class="main-tabs">
  <button class="main-tab active" data-tab="tasks">📋 タスク管理</button>
  <button class="main-tab" data-tab="wishlist">🌟 欲しいものリスト</button>
</div>

<!-- タスク管理 -->
<div class="tab-content visible" id="tab-tasks">
  <div class="task-columns">
    <div class="task-panel">
      <div class="panel-header">
        <span class="panel-title">📋 週タスク</span>
        <span class="panel-progress" id="weekProgress">0/0</span>
      </div>
      <div class="task-list" id="weekList"></div>
      <div class="add-form">
        <div class="add-row">
          <input class="task-input" id="weekInput" placeholder="タスクを追加…">
          <button class="add-btn" id="weekAdd">＋</button>
        </div>
        <div class="add-options">
          <select class="label-select" id="weekLabel">
            <option value="work">💼 仕事</option>
            <option value="priv">🌿 プライベート</option>
          </select>
          <select class="coin-select" id="weekCoin">
            <option value="1">🪙1</option>
            <option value="2">🪙2</option>
            <option value="3" selected>🪙3</option>
            <option value="5">🪙5</option>
            <option value="10">🪙10</option>
          </select>
        </div>
        <button class="reset-btn" id="weekReset">週をリセット</button>
      </div>
    </div>

    <div class="task-panel">
      <div class="panel-header">
        <span class="panel-title">⚡ 今日の予定</span>
        <span class="panel-progress" id="dayProgress">0/0</span>
      </div>
      <div class="task-list" id="dayList"></div>
      <div class="add-form">
        <div class="add-row">
          <input class="task-input" id="dayInput" placeholder="今日やること…">
          <button class="add-btn" id="dayAdd">＋</button>
        </div>
        <div class="add-options">
          <select class="label-select" id="dayLabel">
            <option value="work">💼 仕事</option>
            <option value="priv">🌿 プライベート</option>
          </select>
          <select class="coin-select" id="dayCoin">
            <option value="1" selected>🪙1</option>
            <option value="2">🪙2</option>
            <option value="3">🪙3</option>
            <option value="5">🪙5</option>
          </select>
        </div>
        <button class="reset-btn" id="dayReset">今日の予定をリセット</button>
      </div>
    </div>
  </div>

  <div class="history-panel">
    <div class="history-title">📜 獲得履歴（チェックを外すと取り消し）</div>
    <div class="history-list" id="historyList">
      <div class="empty-msg">まだ記録がありません</div>
    </div>
  </div>
</div>

<!-- 欲しいものリスト -->
<div class="tab-content" id="tab-wishlist">
  <div class="wishlist-panel">
    <div class="panel-title" style="color:var(--violet)">🌟 欲しいものリスト</div>
    <div class="wish-add-form">
      <input class="wish-input" id="wishName" placeholder="商品名">
      <input class="wish-input" id="wishPrice" type="number" placeholder="金額（円）" min="1">
      <input class="wish-input" id="wishUrl" type="url" placeholder="URL（任意）" style="grid-column:1/-1">
      <button class="wish-add-btn" id="wishAdd">＋ 追加する</button>
    </div>
    <div class="wish-list" id="wishList">
      <div class="empty-msg">欲しいものを追加してください</div>
    </div>
  </div>
</div>

<!-- コイン消費モーダル -->
<div class="modal-overlay" id="spendModal">
  <div class="modal">
    <h2>🪙 コインを使う</h2>
    <p>金額を入力するとコイン枚数に換算します。</p>
    <input class="modal-input" type="number" id="spendAmount" placeholder="金額（円）" min="1">
    <div class="coin-preview" id="coinPreview">金額を入力するとコイン枚数が表示されます</div>
    <input class="modal-memo" type="text" id="spendMemo" placeholder="メモ（例：本、おやつ）">
    <div class="modal-btns">
      <button class="modal-ok" id="spendOk">使う</button>
      <button class="modal-cancel" id="spendCancel">キャンセル</button>
    </div>
  </div>
</div>

<script>
function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
}
function save(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
    localStorage.setItem('cw_updatedAt', String(Date.now()));
  } catch {}
  scheduleSync(); // クラウドへも保存（デバウンス付き）
}

let totalCoins = load('cw_totalCoins', 0); // 稼いだ総枚数（減らない）
let spentCoins = load('cw_spentCoins', 0); // 使った枚数
let limitYen   = load('cw_limitYen', 30000);
let rate       = load('cw_rate', 150);
let weekTasks  = load('cw_weekTasks', []);
let dayTasks   = load('cw_dayTasks', []);
let history    = load('cw_history', []);
let wishlist   = load('cw_wishlist', []);

// ── 音 ──────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCoin(n = 1) {
  audioCtx.resume();
  for (let i = 0; i < Math.min(n, 6); i++) {
    setTimeout(() => {
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(1320, t + 0.08);
      osc.frequency.exponentialRampToValueAtTime(1100, t + 0.18);
      gain.gain.setValueAtTime(0.28, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
      osc.start(t); osc.stop(t + 0.32);
    }, i * 90);
  }
}

function playUndo() {
  audioCtx.resume();
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, t);
  osc.frequency.exponentialRampToValueAtTime(300, t + 0.2);
  gain.gain.setValueAtTime(0.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  osc.start(t); osc.stop(t + 0.25);
}

function spawnCoins(el, n) {
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < Math.min(n, 5); i++) {
    setTimeout(() => {
      const coin = document.createElement('div');
      coin.className = 'flying-coin';
      coin.textContent = '🪙';
      coin.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*30) + 'px';
      coin.style.top  = rect.top + 'px';
      document.body.appendChild(coin);
      setTimeout(() => coin.remove(), 800);
    }, i * 80);
  }
}

// ── 概要更新 ─────────────────────────────────────────────────
function updateOverview() {
  const totalYen   = totalCoins * rate;
  const spentYen   = spentCoins * rate;
  const limitCoins = Math.floor(limitYen / rate);
  const remainCoins = totalCoins - spentCoins;
  const remainYen   = remainCoins * rate;
  const pct = limitCoins > 0 ? Math.min(spentCoins / limitCoins * 100, 100) : 0;

  document.getElementById('totalCoinsDisp').textContent = totalCoins + '枚';
  document.getElementById('totalYenDisp').textContent   = '¥' + totalYen.toLocaleString();
  document.getElementById('spentCoinsDisp').textContent = spentCoins + '枚';
  document.getElementById('spentYenDisp').textContent   = '¥' + spentYen.toLocaleString();

  const remainEl    = document.getElementById('remainCoinsDisp');
  const remainYenEl = document.getElementById('remainYenDisp');
  remainEl.textContent    = remainCoins + '枚';
  remainYenEl.textContent = '¥' + remainYen.toLocaleString();
  remainEl.className = 'stat-main ' + (remainCoins < 0 ? 'red' : 'green');

  document.getElementById('budgetBar').style.width = pct + '%';

  // 欲しいものリストの「あと何枚」も更新
  renderWishlist();
}

// ── タスク ───────────────────────────────────────────────────
function renderTasks(tasks, listId, progressId) {
  const list = document.getElementById(listId);
  const prog = document.getElementById(progressId);
  const active = tasks.filter(t => !t.done);
  prog.textContent = `${tasks.filter(t=>t.done).length}/${tasks.length}`;
  list.innerHTML = '';
  if (active.length === 0) {
    list.innerHTML = '<div class="empty-msg">タスクなし</div>';
    return;
  }
  active.forEach(task => {
    const idx = tasks.indexOf(task);
    const item = document.createElement('div');
    item.className = 'task-item';

    const check = document.createElement('button');
    check.className = 'task-check';
    check.addEventListener('click', () => completeTask(tasks, idx, listId, progressId, check));

    const lbl = document.createElement('span');
    lbl.className = 'task-label ' + (task.label || 'work');
    lbl.textContent = task.label === 'priv' ? 'プライベート' : '仕事';

    const text = document.createElement('span');
    text.className = 'task-text';
    text.textContent = task.text;

    const badge = document.createElement('span');
    badge.className = 'task-coin-badge';
    badge.textContent = '🪙' + task.coin;

    const del = document.createElement('button');
    del.className = 'task-del';
    del.textContent = '✕';
    del.addEventListener('click', () => {
      tasks.splice(idx, 1);
      saveTaskList(tasks, listId);
      renderTasks(tasks, listId, progressId);
    });

    item.appendChild(check); item.appendChild(lbl);
    item.appendChild(text); item.appendChild(badge); item.appendChild(del);
    list.appendChild(item);
  });
}

function completeTask(tasks, idx, listId, progressId, checkEl) {
  const task = tasks[idx];
  task.done = true;
  saveTaskList(tasks, listId);

  totalCoins += task.coin;
  save('cw_totalCoins', totalCoins);
  updateOverview();
  playCoin(task.coin);
  spawnCoins(checkEl, task.coin);

  const now = new Date();
  const ts = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  history.unshift({ id: Date.now(), text: task.text, coin: task.coin, label: task.label||'work', ts, sourceList: listId, originalTask: {...task} });
  if (history.length > 60) history.pop();
  save('cw_history', history);

  renderTasks(tasks, listId, progressId);
  renderHistory();
}

function undoHistory(histId) {
  const idx = history.findIndex(h => h.id === histId);
  if (idx < 0) return;
  const entry = history[idx];
  totalCoins = Math.max(0, totalCoins - entry.coin);
  save('cw_totalCoins', totalCoins);
  updateOverview();

  const tasks = entry.sourceList === 'weekList' ? weekTasks : dayTasks;
  tasks.push({ ...entry.originalTask, done: false });
  saveTaskList(tasks, entry.sourceList);
  renderTasks(tasks, entry.sourceList, entry.sourceList === 'weekList' ? 'weekProgress' : 'dayProgress');

  history.splice(idx, 1);
  save('cw_history', history);
  playUndo();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) { list.innerHTML = '<div class="empty-msg">まだ記録がありません</div>'; return; }
  list.innerHTML = '';
  history.slice(0, 30).forEach(h => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const check = document.createElement('button');
    check.className = 'history-check';
    check.addEventListener('click', () => undoHistory(h.id));
    const lbl = document.createElement('span');
    lbl.className = 'h-label ' + (h.label||'work');
    lbl.textContent = h.label === 'priv' ? 'プライベート' : '仕事';
    const text = document.createElement('span');
    text.className = 'h-text'; text.textContent = h.text;
    const coin = document.createElement('span');
    coin.className = 'h-coin'; coin.textContent = '+🪙' + h.coin;
    const ts = document.createElement('span');
    ts.className = 'h-ts'; ts.textContent = h.ts;
    item.appendChild(check); item.appendChild(lbl);
    item.appendChild(text); item.appendChild(coin); item.appendChild(ts);
    list.appendChild(item);
  });
}

function saveTaskList(tasks, listId) {
  save(listId === 'weekList' ? 'cw_weekTasks' : 'cw_dayTasks', tasks);
}

function addTask(tasks, inputId, labelId, coinId, listId, progressId) {
  const input = document.getElementById(inputId);
  const text  = input.value.trim();
  if (!text) return;
  tasks.push({ text, coin: parseInt(document.getElementById(coinId).value), label: document.getElementById(labelId).value, done: false });
  saveTaskList(tasks, listId);
  renderTasks(tasks, listId, progressId);
  input.value = ''; input.focus();
}

// ── 欲しいものリスト ─────────────────────────────────────────
function renderWishlist() {
  const list = document.getElementById('wishList');
  const remainCoins = totalCoins - spentCoins;
  if (wishlist.length === 0) { list.innerHTML = '<div class="empty-msg">欲しいものを追加してください</div>'; return; }
  list.innerHTML = '';
  // 未購入→購入済みの順にソート
  const sorted = [...wishlist].sort((a,b) => {
    if (a.bought !== b.bought) return (a.bought ? 1 : 0) - (b.bought ? 1 : 0);
    return b.price - a.price;
  });
  sorted.forEach(item => {
    const neededCoins = Math.ceil(item.price / rate);
    const canAfford = remainCoins >= neededCoins;
    const el = document.createElement('div');
    el.className = 'wish-item' + (item.bought ? ' bought' : canAfford ? ' affordable' : '');

    const info = document.createElement('div');
    info.className = 'wish-info';

    const name = document.createElement('div');
    name.className = 'wish-name';
    name.textContent = (canAfford && !item.bought ? '✨ ' : '') + item.name;

    const priceRow = document.createElement('div');
    priceRow.className = 'wish-price-row';

    const price = document.createElement('span');
    price.className = 'wish-price';
    price.textContent = '¥' + item.price.toLocaleString() + '（🪙' + neededCoins + '枚）';

    const coinsNeeded = document.createElement('span');
    coinsNeeded.className = 'wish-coins-needed' + (item.bought ? '' : canAfford ? ' ok' : ' ng');
    if (item.bought) {
      coinsNeeded.textContent = '購入済み ✓';
    } else if (canAfford) {
      coinsNeeded.textContent = '今すぐ買える！';
    } else {
      const shortage = neededCoins - remainCoins;
      coinsNeeded.textContent = `あと 🪙${shortage}枚`;
    }

    priceRow.appendChild(price);
    priceRow.appendChild(coinsNeeded);

    info.appendChild(name);
    info.appendChild(priceRow);

    if (item.url) {
      const link = document.createElement('a');
      link.className = 'wish-url';
      link.href = item.url;
      link.target = '_blank';
      link.rel = 'noopener';
      link.textContent = item.url.length > 40 ? item.url.slice(0, 40) + '…' : item.url;
      info.appendChild(link);
    }

    const actions = document.createElement('div');
    actions.className = 'wish-actions';

    if (!item.bought) {
      const buyBtn = document.createElement('button');
      buyBtn.className = 'wish-buy-btn';
      buyBtn.textContent = '購入';
      buyBtn.disabled = !canAfford;
      buyBtn.addEventListener('click', () => buyWish(item.id, neededCoins, buyBtn));
      actions.appendChild(buyBtn);
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'wish-del-btn';
    delBtn.textContent = item.bought ? '削除' : '✕';
    delBtn.addEventListener('click', () => {
      wishlist = wishlist.filter(w => w.id !== item.id);
      save('cw_wishlist', wishlist);
      renderWishlist();
    });
    actions.appendChild(delBtn);

    el.appendChild(info); el.appendChild(actions);
    list.appendChild(el);
  });
}

function buyWish(id, coinsToSpend, btn) {
  if (!confirm(`🪙${coinsToSpend}枚を消費して購入しますか？`)) return;
  spentCoins += coinsToSpend;
  save('cw_spentCoins', spentCoins);
  const item = wishlist.find(w => w.id === id);
  if (item) item.bought = true;
  save('cw_wishlist', wishlist);
  updateOverview();
  playCoin(Math.min(coinsToSpend, 5));
  spawnCoins(btn, Math.min(coinsToSpend, 5));
}

function addWish() {
  const name  = document.getElementById('wishName').value.trim();
  const price = parseInt(document.getElementById('wishPrice').value);
  const url   = document.getElementById('wishUrl').value.trim();
  if (!name || !price || price <= 0) { alert('商品名と金額を入力してください'); return; }
  wishlist.push({ id: Date.now(), name, price, url, bought: false });
  save('cw_wishlist', wishlist);
  renderWishlist();
  document.getElementById('wishName').value = '';
  document.getElementById('wishPrice').value = '';
  document.getElementById('wishUrl').value = '';
}

// ── イベント ─────────────────────────────────────────────────
document.querySelectorAll('.main-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('visible'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('visible');
  });
});

document.getElementById('weekAdd').addEventListener('click', () =>
  addTask(weekTasks, 'weekInput', 'weekLabel', 'weekCoin', 'weekList', 'weekProgress'));
document.getElementById('weekInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask(weekTasks, 'weekInput', 'weekLabel', 'weekCoin', 'weekList', 'weekProgress');
});
document.getElementById('dayAdd').addEventListener('click', () =>
  addTask(dayTasks, 'dayInput', 'dayLabel', 'dayCoin', 'dayList', 'dayProgress'));
document.getElementById('dayInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask(dayTasks, 'dayInput', 'dayLabel', 'dayCoin', 'dayList', 'dayProgress');
});

document.getElementById('weekReset').addEventListener('click', () => {
  if (!confirm('週タスクをリセットしますか？')) return;
  weekTasks.length = 0; save('cw_weekTasks', weekTasks);
  renderTasks(weekTasks, 'weekList', 'weekProgress');
});
document.getElementById('dayReset').addEventListener('click', () => {
  if (!confirm('今日の予定をリセットしますか？')) return;
  dayTasks.length = 0; save('cw_dayTasks', dayTasks);
  renderTasks(dayTasks, 'dayList', 'dayProgress');
});

document.getElementById('rateInput').addEventListener('change', e => {
  rate = Math.max(1, parseInt(e.target.value) || 150);
  save('cw_rate', rate); updateOverview();
});
document.getElementById('limitInput').addEventListener('change', e => {
  limitYen = Math.max(0, parseInt(e.target.value) || 0);
  save('cw_limitYen', limitYen); updateOverview();
});

document.getElementById('wishAdd').addEventListener('click', addWish);
document.getElementById('wishPrice').addEventListener('keydown', e => { if (e.key === 'Enter') addWish(); });

// コイン消費モーダル
document.getElementById('spendBtn').addEventListener('click', () => {
  document.getElementById('spendAmount').value = '';
  document.getElementById('spendMemo').value = '';
  document.getElementById('coinPreview').innerHTML = '金額を入力するとコイン枚数が表示されます';
  document.getElementById('spendModal').classList.add('open');
});
document.getElementById('spendAmount').addEventListener('input', e => {
  const amount = parseInt(e.target.value);
  const preview = document.getElementById('coinPreview');
  if (!amount || amount <= 0) { preview.innerHTML = '金額を入力するとコイン枚数が表示されます'; return; }
  const coins = Math.ceil(amount / rate);
  preview.innerHTML = `→ <span>🪙 ${coins}枚</span> 消費`;
});
document.getElementById('spendCancel').addEventListener('click', () => {
  document.getElementById('spendModal').classList.remove('open');
});
document.getElementById('spendOk').addEventListener('click', () => {
  const amount = parseInt(document.getElementById('spendAmount').value);
  if (!amount || amount <= 0) { alert('金額を入力してください'); return; }
  const coinsToSpend = Math.ceil(amount / rate);
  const remainCoins = totalCoins - spentCoins;
  if (coinsToSpend > remainCoins) {
    if (!confirm(`残りコイン（${remainCoins}枚）を超えてマイナスになります。続けますか？`)) return;
  }
  spentCoins += coinsToSpend;
  save('cw_spentCoins', spentCoins);
  updateOverview();
  document.getElementById('spendModal').classList.remove('open');
});
document.getElementById('spendModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

// ── クラウド同期（Google Apps Script）─────────────────────────
// ★ ここにGASのWebアプリURLを貼る（空のままならlocalStorageのみで動作）
const SYNC_URL = 'https://script.google.com/macros/s/AKfycby4UTn7QT8_ZGayIQxlFzQTxIhJkNcru8lJgZzhyi6UoUYSsVhXoO6lf4R5x-abTmqG/exec';

let syncTimer = null;
let syncBusy  = false;

function setSyncStatus(cls, text) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status' + (cls ? ' ' + cls : '');
  document.getElementById('syncStatusText').textContent = text;
}

function snapshotState() {
  return {
    totalCoins, spentCoins, limitYen, rate,
    weekTasks, dayTasks, history, wishlist,
    updatedAt: Number(localStorage.getItem('cw_updatedAt')) || Date.now()
  };
}

function applyState(s) {
  totalCoins = s.totalCoins ?? 0;
  spentCoins = s.spentCoins ?? 0;
  limitYen   = s.limitYen   ?? 30000;
  rate       = s.rate       ?? 150;
  weekTasks.length = 0; weekTasks.push(...(s.weekTasks ?? []));
  dayTasks.length  = 0; dayTasks.push(...(s.dayTasks ?? []));
  history.length   = 0; history.push(...(s.history ?? []));
  wishlist.length  = 0; wishlist.push(...(s.wishlist ?? []));
  // localStorageにも反映（同期トリガーは不要なので直接書き込み）
  try {
    localStorage.setItem('cw_totalCoins', JSON.stringify(totalCoins));
    localStorage.setItem('cw_spentCoins', JSON.stringify(spentCoins));
    localStorage.setItem('cw_limitYen',   JSON.stringify(limitYen));
    localStorage.setItem('cw_rate',       JSON.stringify(rate));
    localStorage.setItem('cw_weekTasks',  JSON.stringify(weekTasks));
    localStorage.setItem('cw_dayTasks',   JSON.stringify(dayTasks));
    localStorage.setItem('cw_history',    JSON.stringify(history));
    localStorage.setItem('cw_wishlist',   JSON.stringify(wishlist));
    localStorage.setItem('cw_updatedAt',  String(s.updatedAt ?? Date.now()));
  } catch {}
  renderAll();
}

function renderAll() {
  document.getElementById('rateInput').value  = rate;
  document.getElementById('limitInput').value = limitYen;
  updateOverview();
  renderTasks(weekTasks, 'weekList', 'weekProgress');
  renderTasks(dayTasks, 'dayList', 'dayProgress');
  renderHistory();
  renderWishlist();
}

function scheduleSync() {
  if (!SYNC_URL) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncPush, 1500); // 連続操作をまとめて1回で送信
}

async function syncPush() {
  if (!SYNC_URL || syncBusy) { if (syncBusy) scheduleSync(); return; }
  syncBusy = true;
  setSyncStatus('busy', '保存中…');
  try {
    // Content-Typeを付けない＝text/plain扱いになりCORSプリフライトを回避（GAS仕様）
    const res = await fetch(SYNC_URL, { method: 'POST', body: JSON.stringify(snapshotState()) });
    const json = await res.json();
    if (json.ok) setSyncStatus('ok', '同期済み');
    else throw new Error(json.error || 'unknown');
  } catch (e) {
    setSyncStatus('err', '同期失敗');
  } finally {
    syncBusy = false;
  }
}

async function syncPull() {
  if (!SYNC_URL) { setSyncStatus('', 'ローカルのみ'); return; }
  setSyncStatus('busy', '読込中…');
  try {
    const res = await fetch(SYNC_URL);
    const json = await res.json();
    const localAt = Number(localStorage.getItem('cw_updatedAt')) || 0;
    if (json.ok && json.data && (json.data.updatedAt || 0) > localAt) {
      applyState(json.data); // クラウドの方が新しい → 上書き
    } else if (localAt > (json.data?.updatedAt || 0)) {
      syncPush(); // ローカルの方が新しい → クラウドへ送信
      return;
    }
    setSyncStatus('ok', '同期済み');
  } catch (e) {
    setSyncStatus('err', 'オフライン');
  }
}

// ── 初期化 ───────────────────────────────────────────────────
renderAll();   // まずローカルデータで即表示
syncPull();    // クラウドに新しいデータがあれば置き換え

// ── 桜の花びら演出 ──
function spawnPetal() {
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = '🌸';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.fontSize = (0.55 + Math.random() * 0.5) + 'rem';
  p.style.animationDuration = (7 + Math.random() * 6) + 's';
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 14000);
}
setInterval(spawnPetal, 2600);
spawnPetal();
</script>
