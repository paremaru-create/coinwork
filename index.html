<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="おかね日記">
<meta name="theme-color" content="#243B3B">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root{
    --paper:#F4F5F1; --ink:#2A2E2A; --sub:#5B6B63; --faint:#8A8A7E; --faint2:#B5B3A6;
    --card:#FFFFFF; --cardBorder:#EDEBE1; --line:#E2DFD5; --track:#E7E5DF;
    --danger:#D1495B; --primary:#2F6F5E; --primaryBorder:#D8E4D9; --primarySoft:#EFF3EE;
    --dark:#243B3B; --pillBg:#E9E7DD; --soft:#FAF9F5; --softBorder:#F0EEE4;
    --warnBg:#F7EDD9; --warnText:#8A6A2A; --okBg:#E4EEE9; --method:#4A7FA5;
    --chipBg:#F5F4EC; --chipBorder:#E5E2D5; --del:#C7A2A2;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Zen Kaku Gothic New','Hiragino Sans',sans-serif;
    padding-bottom:36px;
    -webkit-tap-highlight-color:transparent;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  input,textarea,select,button{font-family:inherit; font-size:15px;}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary) !important;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  button{cursor:pointer; border:none; background:none;}

  /* header */
  .header{position:sticky; top:0; z-index:30; background:rgba(244,245,241,.95); backdrop-filter:blur(4px);
    border-bottom:1px solid var(--line); padding:14px 16px 8px;}
  .header-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .title{font-size:18px; font-weight:700; letter-spacing:.02em;}
  .seg{display:flex; background:var(--pillBg); border-radius:999px; padding:2px; font-size:14px;}
  .seg button{padding:6px 12px; border-radius:999px; color:var(--sub); transition:.15s;}
  .seg button.active{background:var(--dark); color:#fff;}
  .months{display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin:0 -16px; padding-left:16px; padding-right:16px;}
  .months::-webkit-scrollbar{display:none;}
  .month-btn{flex-shrink:0; padding:6px 12px; border-radius:999px; font-size:14px; border:1px solid var(--line);
    background:#fff; color:var(--sub); position:relative; white-space:nowrap;}
  .month-btn.active{background:var(--primary); color:#fff; border-color:var(--primary);}
  .month-dot{position:absolute; top:-3px; right:-3px; width:9px; height:9px; border-radius:50%; border:1px solid #fff;}

  /* layout */
  .content{padding:16px; display:flex; flex-direction:column; gap:14px;}
  .card{background:#fff; border:1px solid var(--cardBorder); border-radius:18px; padding:16px; box-shadow:0 1px 2px rgba(0,0,0,.02);}
  .card-title{font-size:14px; font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:6px;}
  .row-between{display:flex; align-items:center; justify-content:space-between;}
  .label-sm{font-size:12px; color:var(--faint);}
  .amount-input{font-size:24px; font-weight:600; border:none; width:100%; background:transparent;}
  .amount-row{display:flex; align-items:center; gap:4px;}

  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; text-align:center;}
  .grid3 .big{font-size:16px; font-weight:600;}
  .neg{color:var(--danger);}

  .banner{font-size:12px; padding:9px 12px; border-radius:12px; display:flex; align-items:center; gap:6px; margin-bottom:2px;}
  .banner.ok{background:var(--okBg); color:var(--primary);}
  .banner.warn{background:var(--warnBg); color:var(--warnText);}

  .progress-track{width:100%; height:8px; border-radius:999px; background:var(--track); overflow:hidden; margin-top:6px;}
  .progress-fill{height:100%; border-radius:999px; transition:width .25s;}

  .cat-card{background:#fff; border:1px solid var(--cardBorder); border-radius:18px; overflow:hidden;}
  .cat-head{width:100%; padding:12px 16px; display:flex; align-items:center; gap:10px; text-align:left; background:none;}
  .dot{width:10px; height:10px; border-radius:50%; flex-shrink:0;}
  .cat-name{font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .cat-amt{font-size:14px; font-weight:600; text-align:right;}
  .cat-amt-sub{font-size:11px; color:var(--faint); text-align:right;}
  .chev{width:16px; height:16px; color:var(--faint2); flex-shrink:0; transition:.2s;}
  .chev.open{transform:rotate(180deg);}
  .cat-body{padding:0 16px 16px; border-top:1px solid var(--softBorder); padding-top:12px; display:flex; flex-direction:column; gap:10px;}

  .budget-row{display:flex; align-items:center; justify-content:space-between; font-size:14px;}
  .budget-input-wrap{display:flex; align-items:center; gap:3px;}
  .budget-input{width:96px; text-align:right; border:1px solid var(--line); border-radius:10px; padding:5px 8px;}

  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{font-size:12px; padding:5px 10px; border-radius:999px; background:var(--primarySoft); color:var(--primary);
    border:1px solid var(--primaryBorder); display:flex; align-items:center; gap:4px;}
  .chip2{font-size:12px; padding:5px 4px 5px 10px; border-radius:999px; background:var(--chipBg); color:var(--ink);
    border:1px solid var(--chipBorder); display:flex; align-items:center; gap:4px;}

<body>

<script>
/* ================= 定数 ================= */
const DEFAULT_CATEGORIES = [

const METHODS = ["楽天カード","その他カード","銀行","現金"];
/* 現在の予算項目一覧（ユーザーが追加・削除できる） */
function CATS(){ return state.data.categories; }
const MONTH_LABELS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

/* ================= ヘルパー ================= */
const yen = n => "¥" + Math.round(n||0).toLocaleString("ja-JP");
const uid = () => Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,7);
const mKey = (y,m) => `${y}-${String(m).padStart(2,"0")}`;
const todayISO = () => new Date().toISOString().slice(0,10);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function defaultMonth(){
  const budgets = {}; CATS().forEach(c => budgets[c.id]=0);
  return { budgets, expenses:[], bankBalance:0, income:0, memo:"", recorded:false, recordedAt:null, dirty:false };
}

/* 直前のトラブルで消えかけていた2026年7月分のデータを復元用に同梱しています。

    {id:"r26",categoryId:"living",amount:10141,method:"楽天カード",date:"2026-07-01",memo:"Amazon分割"},
    {id:"r27",categoryId:"medical",amount:3643,method:"楽天カード",date:"2026-07-07",memo:"ハイチオールC+2定期便"},
    {id:"r28",categoryId:"cash",amount:8000,method:"楽天カード",date:"2026-07-04",memo:"ひきだしたぶん"},
    {id:"r29",categoryId:"fun",amount:2392,method:"楽天カード",date:"2026-07-08",memo:"spiritcity DLC"},
    {id:"r30",categoryId:"fun",amount:50,method:"楽天カード",date:"2026-07-06",memo:"カカオピック"},
  ]
};
const RESTORED_TEMPLATES = [
  {id:"t1",name:"NISA",categoryId:"fixed",amount:50000,method:"楽天カード"},
  {id:"t2",name:"交通費",categoryId:"fixed",amount:70000,method:"その他カード"},
  {id:"t3",name:"フォトショ",categoryId:"fixed",amount:1700,method:"楽天カード"},
  {id:"t4",name:"Audible",categoryId:"fixed",amount:1500,method:"楽天カード"},
  {id:"t5",name:"電気代",categoryId:"fixed",amount:20000,method:"楽天カード"},
  {id:"t6",name:"水道代",categoryId:"fixed",amount:4000,method:"銀行"},
  {id:"t7",name:"セキュリティ",categoryId:"fixed",amount:500,method:"その他カード"},
  {id:"t8",name:"楽天ブロードバンド",categoryId:"fixed",amount:5280,method:"楽天カード"},
  {id:"t9",name:"楽天スマホ",categoryId:"fixed",amount:2073,method:"楽天カード"},
];
function defaultData(){
  return {
    categories: DEFAULT_CATEGORIES.map(c=>({...c})),
    monthsData:{ "2026-07": RESTORED_2026_07 },
    recurringTemplates: RESTORED_TEMPLATES.map(t=>({...t})),
    history:[],
    syncUrl:"", syncToken:"", lastSyncedAt:null,
  };
}

function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultData();
    return { ...defaultData(), ...JSON.parse(raw) };
  }catch(e){ return defaultData(); }
}
let saveTimer=null;
function saveData(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }
    catch(e){ console.error("保存失敗", e); }
  }, 300);
}

function getMonth(data,key){ return data.monthsData[key] || defaultMonth(); }
function withMonth(data,key,fn){
  const cur = data.monthsData[key] || defaultMonth();
  const draft = JSON.parse(JSON.stringify(cur));
  fn(draft);
  if(data.monthsData[key] && data.monthsData[key].recorded) draft.dirty = true;
  data.monthsData = { ...data.monthsData, [key]: draft };
  return data;
}
function spentByCategory(m,catId){ return m.expenses.filter(e=>e.categoryId===catId).reduce((s,e)=>s+Number(e.amount||0),0); }
function spentByMethod(m,method){ return m.expenses.filter(e=>e.method===method).reduce((s,e)=>s+Number(e.amount||0),0); }
function totalBudget(m){ return Object.values(m.budgets).reduce((s,v)=>s+Number(v||0),0); }
function totalSpent(m){ return m.expenses.reduce((s,e)=>s+Number(e.amount||0),0); }

function buildSnapshot(year, monthNum, m){
  const catBudget={}, catActual={};
  CATS().forEach(c=>{ catBudget[c.id]=Number(m.budgets[c.id]||0); catActual[c.id]=spentByCategory(m,c.id); });
  const byMethod={}; METHODS.forEach(mm=> byMethod[mm]=spentByMethod(m,mm));
  return {
    monthKey: mKey(year,monthNum), year, monthNum, label:`${year}年${MONTH_LABELS[monthNum-1]}`,
    bankBalance:Number(m.bankBalance||0), income:Number(m.income||0), catBudget, catActual,
    totalBudget: totalBudget(m), totalActual: totalSpent(m), byMethod,
    memo: m.memo||"", recordedAt: new Date().toISOString(),
  };
}
function buildTSV(history){
  const header = ["年月","収入","銀行残高","予算合計","実績合計","差額",
    ...CATS().flatMap(c=>[`${c.name}(予算)`,`${c.name}(実績)`]),
    ...METHODS.map(m=>`${m}(実績)`), "メモ","記録日時"];
  const rows = [...history].sort((a,b)=> a.monthKey>b.monthKey?1:-1).map(h=>{
    const clean = s => String(s||"").replace(/[\t\n\r]+/g," ");
    return [h.label, h.income||0, h.bankBalance, h.totalBudget, h.totalActual, h.totalBudget-h.totalActual,
      ...CATS().flatMap(c=>[h.catBudget[c.id]||0, h.catActual[c.id]||0]),
      ...METHODS.map(m=>h.byMethod[m]||0), clean(h.memo),
      h.recordedAt? new Date(h.recordedAt).toLocaleString("ja-JP") : ""].join("\t");
  });
  return [header.join("\t"), ...rows].join("\n");
}

/* ================= 状態 ================= */
const now = new Date();
const state = {
  data: loadData(),
  view: "month",           // 'month' | 'history'
  year: now.getFullYear(),
  month: now.getMonth()+1,
  openCat: null,
  addForm: null,           // {categoryId, amount, method, date, memo}
  editForm: null,          // {id, categoryId, amount, method, date, memo}
  tplForm: null,           // {id?, name, categoryId, amount, method}
  catForm: null,           // {name, color}
  tplEditMode: false,
  csvOpen: false,
  historyOpenKey: null,
};

function showToast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(()=> el.classList.remove("show"), 1700);
}

/* ================= レンダリング ================= */
function currentKey(){ return mKey(state.year, state.month); }

function render(){
  const app = document.getElementById("app");
  app.innerHTML = renderHeader() + `<div class="content">` + (state.view==="month" ? renderMonthView() : renderHistoryView()) + `</div>`;
}

function renderHeader(){
  let monthsHtml = "";
  if(state.view==="month"){
    monthsHtml = `<div class="months">` + MONTH_LABELS.map((label,i)=>{
      const mnum=i+1, mk=mKey(state.year,mnum);
      const md = state.data.monthsData[mk];
      const dotColor = md?.recorded ? (md.dirty ? "#D4A24C" : "#4C8577") : null;
      return `<button class="month-btn ${mnum===state.month?'active':''}" data-action="set-month" data-month="${mnum}">
        ${label}${dotColor?`<span class="month-dot" style="background:${dotColor}"></span>`:""}
      </button>`;
    }).join("") + `</div>`;
  }
  return `
  <div class="header">
    <div class="header-row">
      <div class="title">おかね日記</div>
      <div class="seg">
        <button class="${state.view==='month'?'active':''}" data-action="set-view" data-view="month">月ごと</button>
        <button class="${state.view==='history'?'active':''}" data-action="set-view" data-view="history">履歴</button>
      </div>
    </div>
    ${monthsHtml}
  </div>`;
}

function renderMonthView(){
  const key = currentKey();
  const md = getMonth(state.data, key);
  const tBudget = totalBudget(md), tSpent = totalSpent(md), remaining = tBudget - tSpent;

  let banner = "";
  if(md.recorded){
    banner = md.dirty
      ? `<div class="banner warn">✓ 記録済みですが内容が変わっています。再記録すると履歴が更新されます。</div>`
      : `<div class="banner ok">✓ ${new Date(md.recordedAt).toLocaleString("ja-JP")} に記録済み</div>`;
  }

  const catCards = CATS().map(cat => renderCategoryCard(cat, md, key)).join("");

  const payRows = METHODS.map(m=>{
    const amt = spentByMethod(md,m);
    const pct = tSpent>0 ? (amt/tSpent*100) : 0;
    return `<div class="pay-row">
      <div class="pay-label"><span>${esc(m)}</span><span class="mono">${yen(amt)}</span></div>
      <div class="pay-track"><div class="pay-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join("");

  const tplChips = state.data.recurringTemplates.map(t=>{
    const cat = CATS().find(c=>c.id===t.categoryId);
    if(state.tplEditMode){
      return `<div class="chip2"><span class="dot" style="width:6px;height:6px;background:${cat?.color}"></span>
        <button data-action="edit-tpl" data-id="${t.id}">${esc(t.name)}（${yen(t.amount)}）</button>
        <button data-action="delete-tpl" data-id="${t.id}">✕</button></div>`;
    }
    return `<div class="chip2"><span class="dot" style="width:6px;height:6px;background:${cat?.color}"></span>
      <button data-action="add-from-tpl" data-id="${t.id}">${esc(t.name)}（${yen(t.amount)}）</button></div>`;
  }).join("") || `<div class="label-sm">まだありません</div>`;

  const tplFormHtml = state.tplForm ? renderTplForm() :
    `<button class="dash-btn" data-action="open-tpl-form">＋ 新しい繰り返し項目</button>`;

  const income = Number(md.income||0);
  const incomeRemaining = income - tSpent;

  return `
    ${banner}
    <div class="card">
      <div class="card-title">🧾 今月の収入</div>
      <div class="amount-row">
        <span class="mono" style="font-size:18px;">¥</span>
        <input class="amount-input mono" type="number" inputmode="numeric" placeholder="0"
          value="${md.income||""}" data-action="input-income" />
      </div>
      <div class="row-between" style="margin-top:10px; font-size:13px; color:var(--sub);">
        <span>収入</span><span class="mono" id="income-base">${yen(income)}</span>
      </div>
      <div class="row-between" style="font-size:13px; color:var(--sub);">
        <span>支出合計</span><span class="mono" id="income-spent">-${yen(tSpent)}</span>
      </div>
      <div class="row-between" style="font-size:15px; font-weight:600; margin-top:4px; border-top:1px solid var(--softBorder); padding-top:8px;">
        <span>収入からの残り</span><span class="mono ${incomeRemaining<0?'neg':''}" id="income-remaining">${yen(incomeRemaining)}</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💰 銀行残高（給料日に記入）</div>
      <div class="amount-row">
        <span class="mono" style="font-size:18px;">¥</span>
        <input class="amount-input mono" type="number" inputmode="numeric" placeholder="0"
          value="${md.bankBalance||""}" data-action="input-bank" />
      </div>
    </div>

    <div class="card">
      <div class="grid3">
        <div><div class="label-sm">予算合計</div><div class="big mono" id="sum-budget">${yen(tBudget)}</div></div>
        <div><div class="label-sm">実績合計</div><div class="big mono" id="sum-spent">${yen(tSpent)}</div></div>
        <div><div class="label-sm">残り</div><div class="big mono ${remaining<0?'neg':''}" id="sum-remaining">${yen(remaining)}</div></div>
      </div>
    </div>

    ${renderCategoryManager()}

    <div style="display:flex; flex-direction:column; gap:8px;">${catCards}</div>

    <div class="card">
      <div class="card-title">支払い方法別の合計</div>
      ${payRows}
    </div>

    <div class="card">

    <div class="form-box" style="margin-bottom:8px;">
      <input type="text" placeholder="Web AppのURL（.../exec）" value="${esc(d.syncUrl)}" data-action="input-sync-url" />

    </div>
    <div class="form-actions" style="margin-bottom:8px;">
      <button class="btn-ghost" style="border:1px solid var(--line); border-radius:10px;" data-action="pull-sync">⬇ サーバーから取得</button>
      <button class="btn-solid" data-action="push-sync">⬆ サーバーへ送信</button>
    </div>
    <div class="sync-status">最終同期：${lastSync}</div>
    <details class="help" style="margin-top:10px;">
      <summary>設定方法を見る（初回のみ）</summary>
      <div class="help-steps">
        1. Googleスプレッドシートを新規作成する<br/>
        2. メニューの「拡張機能」→「Apps Script」を開く<br/>
        3. 下のコードを全部貼り付けて保存する（プロジェクト名は何でもOK）<br/>
        4. 右上の「デプロイ」→「新しいデプロイ」→種類「ウェブアプリ」を選択<br/>
        5. 「アクセスできるユーザー」を「全員」にしてデプロイする<br/>
        6. 発行された「.../exec」で終わるURLをコピーし、上の欄に貼り付ける<br/>
        7. 合言葉（トークン）は自分だけがわかる好きな文字列でOK。全端末で同じものを使う<br/>
        8. まずこの端末で「⬆ サーバーへ送信」を押す→他の端末では同じURL・合言葉を入れて「⬇ サーバーから取得」を押す
      </div>
      <div class="code-box" id="gas-code">function doGet(e){ return handle_(e); }
function doPost(e){ return handle_(e); }
function handle_(e){
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheets()[0];
  var props = PropertiesService.getScriptProperties();
  var token = (e.parameter && e.parameter.token) || "";
  var saved = props.getProperty("TOKEN");
  if(!saved){
    if(!token) return json_({error:"token required"});
    props.setProperty("TOKEN", token);
    saved = token;
  }
  if(token !== saved) return json_({error:"unauthorized"});
  if(e.postData && e.postData.contents){
    sheet.getRange("A1").setValue(e.postData.contents);
    return json_({ok:true});
  }
  var val = sheet.getRange("A1").getValue();
  return ContentService.createTextOutput(val || "{}").setMimeType(ContentService.MimeType.JSON);
}
function json_(obj){
  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);
}</div>
      <button style="font-size:12px; color:var(--primary); text-decoration:underline;" data-action="copy-gas-code">📋 上のコードをコピー</button>
    </details>
  </div>`;
}

function yenShort(n){
  n = Math.round(n||0);
  const sign = n<0 ? "-" : "";
  const abs = Math.abs(n);
  if(abs>=10000) return sign + (abs/10000).toFixed(abs%10000===0?0:1) + "万";
  return sign + "¥" + abs.toLocaleString("ja-JP");
}

function renderBalanceChart(history){
  const chronological = [...history].sort((a,b)=> a.monthKey<b.monthKey?-1:1).slice(-12);
  if(chronological.length===0){
    return `<div class="card">
      <div class="card-title">📊 月ごとの支出バランス</div>
      <div class="empty" style="padding:24px 0;">記録した月がまだありません</div>
    </div>`;
  }
  const maxVal = Math.max(1, ...chronological.flatMap(h=>[h.totalBudget, h.totalActual]));
  const W = 320, H = 210, padL = 6, padR = 6, padT = 18, padB = 30;
  const chartW = W - padL - padR, chartH = H - padT - padB;
  const groupW = chartW / chronological.length;
  const barW = Math.max(6, Math.min(16, groupW/2 - 6));
  const gap = 3;

  const gridLines = [0.25,0.5,0.75,1].map(f=>{
    const y = padT + chartH * (1-f);
    return `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#E2DFD5" stroke-width="1" stroke-dasharray="2,3"/>`;
  }).join("");

  const bars = chronological.map((h,i)=>{
    const gx = padL + i*groupW + groupW/2;
    const bH1 = (h.totalBudget/maxVal)*chartH;
    const bH2 = (h.totalActual/maxVal)*chartH;
    const over = h.totalBudget>0 && h.totalActual > h.totalBudget;
    const x1 = gx - barW - gap/2;
    const x2 = gx + gap/2;
    const y1 = padT + chartH - bH1;
    const y2 = padT + chartH - bH2;
    const shortLabel = (h.label.split("年")[1] || h.label).replace("月","");
    return `
      <rect x="${x1.toFixed(1)}" y="${y1.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0,bH1).toFixed(1)}" fill="#B5B3A6" rx="2"/>
      <rect x="${x2.toFixed(1)}" y="${y2.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0,bH2).toFixed(1)}" fill="${over?'#D1495B':'#2F6F5E'}" rx="2"/>
      <text x="${gx.toFixed(1)}" y="${H-10}" font-size="9" fill="#5B6B63" text-anchor="middle">${esc(shortLabel)}</text>
    `;
  }).join("");

  return `<div class="card">
    <div class="card-title">📊 月ごとの支出バランス（予算 vs 実績）</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto; display:block;">
      ${gridLines}
      ${bars}
      <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="#D8D5C9" stroke-width="1"/>
    </svg>
    <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:8px; font-size:11px; color:var(--sub);">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#B5B3A6;margin-right:4px;"></span>予算</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#2F6F5E;margin-right:4px;"></span>実績（予算内）</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#D1495B;margin-right:4px;"></span>実績（予算超過）</span>
    </div>
  </div>`;
}

            </div>
          </button>
          <button class="exp-del" style="margin-left:6px;" data-action="delete-history" data-key="${h.monthKey}" title="この記録を削除">🗑</button>
        </div>
        ${body}
      </div>`;
    }).join("");

  return `
    ${renderBalanceChart(history)}
    <div class="row-between">
      <div class="label-sm" style="font-size:13px;">📅 記録した月：${history.length}件</div>
      <button class="top-copy-btn" data-action="copy-csv">📋 スプシ用にコピー</button>
    </div>
    ${csvBox}
    <div style="display:flex; flex-direction:column; gap:8px;">${list}</div>
  `;
}

function setBudget(catId, value){
  withMonth(state.data, currentKey(), d => { d.budgets[catId] = value===""?0:Number(value); });
  saveData();
  const md = getMonth(state.data, currentKey());
  const tBudget = totalBudget(md), tSpent = totalSpent(md), remaining = tBudget - tSpent;
  document.getElementById("sum-budget").textContent = yen(tBudget);
  document.getElementById("sum-remaining").textContent = yen(remaining);
  document.getElementById("sum-remaining").classList.toggle("neg", remaining<0);
  const spent = spentByCategory(md, catId);
  const budget = Number(md.budgets[catId]||0);
  const over = budget>0 && spent>budget;
  const pct = budget>0 ? Math.min(100, spent/budget*100) : (spent>0?100:0);
  const cat = CATS().find(c=>c.id===catId);
  const bar = document.getElementById(`cat-bar-${catId}`);
  if(bar){ bar.style.width = pct+"%"; bar.style.background = over? "#D1495B" : cat.color; }
  const amtEl = document.getElementById(`cat-amt-${catId}`);
  if(amtEl){ amtEl.classList.toggle("neg", over); }
  const remainEl = document.getElementById(`cat-remain-${catId}`);
  if(remainEl){ remainEl.textContent = `残り ${yen(budget-spent)}`; remainEl.classList.toggle("neg", over); }
}

function addExpense(){

  if(!f.amount || Number(f.amount)<=0){ showToast("金額を入力してください"); return; }
  withMonth(state.data, currentKey(), d => {
    d.expenses.push({ id:uid(), categoryId:f.categoryId, amount:Number(f.amount), method:f.method||METHODS[0], date:f.date||todayISO(), memo:f.memo||"" });
  });
  saveData();
  state.addForm = null;
  render();
  showToast("記録しました");
}

  withMonth(state.data, currentKey(), d => { d.expenses = d.expenses.filter(e=>e.id!==id); });
  saveData();
  render();
}

  const f = state.editForm;

  withMonth(state.data, currentKey(), d => {

}
function addFromTemplate(id){
  const tpl = state.data.recurringTemplates.find(t=>t.id===id);
  if(!tpl) return;
  withMonth(state.data, currentKey(), d => {
    d.expenses.push({ id:uid(), categoryId:tpl.categoryId, amount:Number(tpl.amount), method:tpl.method, date:todayISO(), memo:tpl.name, templateId:tpl.id });
  });
  saveData();
  render();
  showToast(`「${tpl.name}」を追加しました`);
}
function saveTemplate(){
  const f = state.tplForm;
  if(!f.name || !f.amount){ showToast("項目名と金額を入力してください"); return; }
  const tpl = { id: f.id || uid(), name:f.name, categoryId:f.categoryId||CATS()[0].id, amount:Number(f.amount), method:f.method||METHODS[0] };
  if(f.id){ state.data.recurringTemplates = state.data.recurringTemplates.map(t=> t.id===f.id? tpl : t); }
  else{ state.data.recurringTemplates = [...state.data.recurringTemplates, tpl]; }
  saveData();
  state.tplForm = null;
  render();
  showToast("繰り返し項目を保存しました");
}
function deleteTemplate(id){
  state.data.recurringTemplates = state.data.recurringTemplates.filter(t=>t.id!==id);
  saveData();
  render();
}
function addCategory(){
  const f = state.catForm;
  if(!f.name || !f.name.trim()){ showToast("項目名を入力してください"); return; }
  const cat = { id: uid(), name: f.name.trim(), color: f.color || COLOR_PALETTE[0] };
  state.data.categories = [...state.data.categories, cat];
  saveData();
  state.catForm = null;
  render();
  showToast("予算項目を追加しました");
}
function deleteCategory(id){
  const cat = CATS().find(c=>c.id===id);
  if(!cat) return;
  const hasExpense = Object.values(state.data.monthsData).some(m => m.expenses.some(e=>e.categoryId===id));
  const msg = hasExpense
    ? `「${cat.name}」を削除しますか？\n過去の支出データは残りますが、この項目の下には表示されなくなります。`
    : `「${cat.name}」を削除しますか？`;
  if(!confirm(msg)) return;
  state.data.categories = state.data.categories.filter(c=>c.id!==id);
  saveData();
  render();
  showToast("予算項目を削除しました");
}

/* ================= 他端末との同期 ================= */
function setSyncField(key, value){
  state.data[key] = value;
  saveData();
}
async function pushSync(){
  const url = (state.data.syncUrl||"").trim(), token = (state.data.syncToken||"").trim();
  if(!url){ showToast("同期先のURLを入力してください"); return; }
  showToast("送信中…");
  try{
    const res = await fetch(`${url}?token=${encodeURIComponent(token)}`, { method:"POST", body: JSON.stringify(state.data) });
    const text = await res.text();
    let json; try{ json = JSON.parse(text); }catch(e){ json = null; }
    if(json && json.error){ showToast("エラー："+json.error); return; }
    state.data.lastSyncedAt = new Date().toISOString();
    saveData();
    render();
    showToast("サーバーへ送信しました");
  }catch(err){ showToast("送信に失敗しました。URLを確認してください"); }
}
async function pullSync(){
  const url = (state.data.syncUrl||"").trim(), token = (state.data.syncToken||"").trim();
  if(!url){ showToast("同期先のURLを入力してください"); return; }
  if(!confirm("サーバー側のデータでこの端末のデータを上書きします。よろしいですか？")) return;
  showToast("取得中…");
  try{
    const res = await fetch(`${url}?token=${encodeURIComponent(token)}`);
    const text = await res.text();
    let json; try{ json = JSON.parse(text); }catch(e){ showToast("取得したデータを解析できませんでした"); return; }
    if(json && json.error){ showToast("エラー："+json.error); return; }
    if(!json || !json.monthsData){ showToast("サーバーにまだデータがありません。先に「送信」してください"); return; }
    state.data = { ...defaultData(), ...json, syncUrl:url, syncToken:token, lastSyncedAt: new Date().toISOString() };
    saveData();
    render();
    showToast("サーバーから取得しました");
  }catch(err){ showToast("取得に失敗しました。URLを確認してください"); }
}
async function copyGasCode(){
  const code = document.getElementById("gas-code").textContent;
  try{ await navigator.clipboard.writeText(code); showToast("コピーしました。Apps Scriptに貼り付けてください"); }
  catch(e){ showToast("コピーに失敗しました。手動で選択してコピーしてください"); }
}
function recordMonth(){
  const key = currentKey();
  const md = getMonth(state.data, key);
  const snap = buildSnapshot(state.year, state.month, md);
  state.data.history = [...state.data.history.filter(h=>h.monthKey!==key), snap];
  state.data.monthsData = { ...state.data.monthsData, [key]: { ...md, recorded:true, recordedAt:snap.recordedAt, dirty:false } };
  saveData();
  render();
  showToast("履歴（スプシ）に記録しました");
}
function deleteHistoryEntry(key){
  const h = state.data.history.find(x=>x.monthKey===key);
  const label = h ? h.label : key;
  if(!confirm(`${label}の記録を履歴から削除しますか？\n（月ごとの支出データ自体は削除されません）`)) return;
  state.data.history = state.data.history.filter(x=>x.monthKey!==key);
  if(state.data.monthsData[key]){
    state.data.monthsData = { ...state.data.monthsData, [key]: { ...state.data.monthsData[key], recorded:false, recordedAt:null, dirty:false } };
  }
  if(state.historyOpenKey===key) state.historyOpenKey = null;
  saveData();
  render();
  showToast("履歴を削除しました");
}
async function copyCSV(){
  const tsv = buildTSV(state.data.history);
  try{
    await navigator.clipboard.writeText(tsv);
    showToast("コピーしました。スプシに貼り付けてください");
  }catch(e){
    showToast("下の欄を長押しして手動でコピーしてください");
    state.csvOpen = true;
    render();
  }
}

/* ================= イベント委譲 ================= */
document.addEventListener("click", (e)=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const act = el.dataset.action;

  if(act==="set-view"){ state.view = el.dataset.view; state.openCat=null; state.addForm=null; state.editForm=null; render(); }
  else if(act==="set-month"){ state.month = Number(el.dataset.month); state.openCat=null; state.addForm=null; state.editForm=null; render(); }
  else if(act==="toggle-cat"){
    const cat = el.dataset.cat;
    state.openCat = state.openCat===cat ? null : cat;
    state.addForm = null;
    state.editForm = null;
    render();
  }
  else if(act==="open-add-form"){
    state.addForm = { categoryId: el.dataset.cat, amount:"", method: METHODS[0], date: todayISO(), memo:"" };
    state.editForm = null;
    render();
    const inp = document.querySelector('[data-action="form-amount"]');
    if(inp) inp.focus();
  }
  else if(act==="cancel-add-form"){ state.addForm=null; render(); }
  else if(act==="submit-add-form"){ addExpense(); }
  else if(act==="form-method"){ state.addForm.method = el.dataset.method; render(); }
  else if(act==="delete-expense"){ deleteExpense(el.dataset.id); }
  else if(act==="open-edit-expense"){
    const md = getMonth(state.data, currentKey());
    const exp = md.expenses.find(x=>x.id===el.dataset.id);
    if(exp){
      state.editForm = { id:exp.id, categoryId:exp.categoryId, amount:exp.amount, method:exp.method, date:exp.date, memo:exp.memo||"" };
      state.addForm = null;
      render();
    }
  }
  else if(act==="cancel-edit-expense"){ state.editForm=null; render(); }
  else if(act==="submit-edit-expense"){ updateExpense(); }
  else if(act==="edit-method"){ state.editForm.method = el.dataset.method; render(); }
  else if(act==="add-from-tpl"){ addFromTemplate(el.dataset.id); }
  else if(act==="toggle-tpl-edit"){ state.tplEditMode = !state.tplEditMode; render(); }
  else if(act==="open-tpl-form"){ state.tplForm = { name:"", categoryId:CATS()[0].id, amount:"", method:METHODS[0] }; render(); }
  else if(act==="edit-tpl"){
    const tpl = state.data.recurringTemplates.find(t=>t.id===el.dataset.id);
    if(tpl) state.tplForm = { ...tpl }; render();
  }
  else if(act==="delete-tpl"){ deleteTemplate(el.dataset.id); }
  else if(act==="cancel-tpl-form"){ state.tplForm=null; render(); }
  else if(act==="submit-tpl-form"){ saveTemplate(); }
  else if(act==="tpl-method"){ state.tplForm.method = el.dataset.method; render(); }
  else if(act==="record-month"){ recordMonth(); }
  else if(act==="copy-csv"){ copyCSV(); }
  else if(act==="close-csv"){ state.csvOpen=false; render(); }
  else if(act==="toggle-history"){
    const k = el.dataset.key;
    state.historyOpenKey = state.historyOpenKey===k ? null : k;
    render();
  }
  else if(act==="delete-history"){ deleteHistoryEntry(el.dataset.key); }
  else if(act==="open-cat-form"){ state.catForm = { name:"", color:COLOR_PALETTE[0] }; render(); }
  else if(act==="cancel-cat-form"){ state.catForm=null; render(); }
  else if(act==="submit-cat-form"){ addCategory(); }
  else if(act==="cat-color"){ state.catForm.color = el.dataset.color; render(); }
  else if(act==="delete-category"){ deleteCategory(el.dataset.id); }
  else if(act==="push-sync"){ pushSync(); }
  else if(act==="pull-sync"){ pullSync(); }
  else if(act==="copy-gas-code"){ copyGasCode(); }
});

document.addEventListener("input", (e)=>{
  const el = e.target;
  const act = el.dataset.action;
  if(!act) return;

  if(act==="input-budget"){ setBudget(el.dataset.cat, el.value); }
  else if(act==="input-bank"){ setBankBalance(el.value); }
  else if(act==="input-income"){ setIncome(el.value); }
  else if(act==="input-memo"){ setMemo(el.value); }
  else if(act==="form-amount"){ state.addForm.amount = el.value; }
  else if(act==="form-date"){ state.addForm.date = el.value; }
  else if(act==="form-memo"){ state.addForm.memo = el.value; }
  else if(act==="edit-amount"){ state.editForm.amount = el.value; }
  else if(act==="edit-date"){ state.editForm.date = el.value; }
  else if(act==="edit-memo"){ state.editForm.memo = el.value; }
  else if(act==="tpl-name"){ state.tplForm.name = el.value; }
  else if(act==="tpl-amount"){ state.tplForm.amount = el.value; }
  else if(act==="cat-name"){ state.catForm.name = el.value; }
  else if(act==="input-sync-url"){ setSyncField("syncUrl", el.value); }
  else if(act==="input-sync-token"){ setSyncField("syncToken", el.value); }
});

document.addEventListener("change", (e)=>{
  const el = e.target;
  if(el.dataset.action==="tpl-category"){ state.tplForm.categoryId = el.value; }
});

/* ================= 起動 ================= */
render();
</script>
</body>
